# Postgres locale per sviluppo (Fase 11) — docker compose up -d
services:
  db:
    image: postgres:16
    container_name: heemia-postgres
    environment:
      POSTGRES_USER: heemia
      POSTGRES_PASSWORD: heemia
      POSTGRES_DB: heemia_dev
    ports:
      - "5432:5432"
    volumes:
      - heemia_pgdata:/var/lib/postgresql/data
volumes:
  heemia_pgdata:
